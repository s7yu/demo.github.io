<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电影目录 Movies</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            background: #f5f7fa;
            padding: 30px max(20px, 5%);
        }
        h1 {
            text-align: center;
            color: #222;
            margin-bottom: 40px;
        }
        .movie-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 24px;
        }
        .movie-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .movie-card h2 {
            color: #165DFF;
            font-size: 20px;
            margin-bottom: 12px;
            border-bottom: 1px solid #eee;
            padding-bottom: 8px;
        }
        .info-row {
            margin: 8px 0;
            line-height: 1.6;
        }
        .label {
            font-weight: bold;
            color: #444;
            display: inline-block;
            width: 90px;
        }
        .director-item {
            display: inline-block;
            background: #e8f3ff;
            padding: 3px 8px;
            border-radius: 6px;
            margin: 2px 4px 2px 0;
            font-size: 14px;
        }
        #loading {
            text-align: center;
            font-size: 18px;
            color: #666;
            padding: 60px 0;
        }
        .error {
            color: #f53f3f;
            text-align: center;
            padding: 40px;
        }
    </style>
</head>
<body>
    <h1>电影信息目录（Movies 对象树）</h1>
    <div id="loading">正在加载 Movies.txt 电影数据...</div>
    <div class="movie-list" id="container"></div>

    <script>
        // 页面加载完成自动读取同目录 Movies.txt
        window.onload = async function() {
            try {
                const res = await fetch('./Movies.txt');
                if (!res.ok) throw new Error("文件读取失败，请确认Movies.txt已上传到仓库根目录");
                const text = await res.text();
                const movies = parseMovieTxt(text);
                renderMovies(movies);
            } catch (err) {
                document.getElementById('loading').innerHTML = `<div class="error">加载异常：${err.message}</div>`;
                console.error(err);
            }
        };

        // 解析 Movies.txt 文本，还原题目要求的对象树结构
        function parseMovieTxt(rawText) {
            const blocks = rawText.trim().split(/\n\s*\n/); // 空行分割单部电影
            const movieArr = [];
            for (const block of blocks) {
                const lines = block.split('\n').filter(line => line.trim() !== "");
                const movie = {
                    Title: "",
                    Genre: "",
                    Director: [], // 支持多个导演
                    Studio: "",
                    Year: ""
                };
                for (const line of lines) {
                    const [key, val] = line.split(/:\s*/);
                    if (!key || !val) continue;
                    switch(key) {
                        case "Title":
                            movie.Title = val;
                            break;
                        case "Genre":
                            movie.Genre = val;
                            break;
                        case "Director Name":
                            movie.Director.push(val);
                            break;
                        case "Studio":
                            movie.Studio = val;
                            break;
                        case "Year":
                            movie.Year = val;
                            break;
                    }
                }
                movieArr.push(movie);
            }
            return movieArr;
        }

        // 渲染电影卡片到页面
        function renderMovies(movies) {
            document.getElementById('loading').style.display = "none";
            const wrap = document.getElementById('container');
            wrap.innerHTML = "";
            movies.forEach(m => {
                const directorsHtml = m.Director.map(name => `<span class="director-item">${name}</span>`).join("");
                const card = `
                    <div class="movie-card">
                        <h2>${m.Title}</h2>
                        <div class="info-row">
                            <span class="label">类型：</span>${m.Genre}
                        </div>
                        <div class="info-row">
                            <span class="label">导演：</span>${directorsHtml}
                        </div>
                        <div class="info-row">
                            <span class="label">制片厂：</span>${m.Studio}
                        </div>
                        <div class="info-row">
                            <span class="label">年份：</span>${m.Year}
                        </div>
                    </div>
                `;
                wrap.innerHTML += card;
            });
        }
    </script>
</body>
</html>
